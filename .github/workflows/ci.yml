name: CI Suite

env:
  PYTHONDONTWRITEBYTECODE: "1"
  CI_MOCK_FRESH_DB: "1"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, labeled ]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: self-hosted
    outputs:
      runtime: ${{ steps.filter.outputs.runtime }}
      isolation: ${{ steps.filter.outputs.isolation }}
      credential_prober: ${{ steps.filter.outputs.credential_prober }}
      litellm_reloader: ${{ steps.filter.outputs.litellm_reloader }}
      hotspot: ${{ steps.filter.outputs.hotspot }}
      translator: ${{ steps.filter.outputs.translator }}
      cliproxy: ${{ steps.filter.outputs.cliproxy }}
      litellm_config: ${{ steps.filter.outputs.litellm_config }}
      compose: ${{ steps.filter.outputs.compose }}
      integration_tests: ${{ steps.filter.outputs.integration_tests }}
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
          sudo mkdir -p /var/cache/ai-gateway/{pip,buildkit}
          sudo chown -R "$(id -u)":"$(id -g)" /var/cache/ai-gateway || true
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            translator:
              - 'services/translator/**'
            litellm_reloader:
              - 'services/litellm-reloader/**'
            litellm_config:
              - 'litellm-config.yaml'
              - 'tests/litellm-config-mock.yaml'
            compose:
              - 'docker-compose*.yml'
              - 'Dockerfile*'
            cliproxy:
              - 'Dockerfile.cliproxy'
              - 'tests/mock-upstream/**'
              - 'tests/cliproxy-config-ci.yaml'
            runtime:
              - 'services/**'
              - 'tests/**'
              - 'docker-compose*.yml'
              - 'litellm-config.yaml'
              - 'config/**'
              - 'scripts/**'
              - 'Dockerfile*'
              - '*.sh'
              - 'Makefile'
              - 'db/**'
              - '.github/workflows/**'
            isolation:
              - 'tests/test-multi-repo-isolation.sh'
              - 'dev-env.sh'
              - 'cliproxy-setup.sh'
              - 'gen-client-config.sh'
            credential_prober:
              - 'services/credential-prober/**'
            integration_tests:
              - 'tests/integration/**'
              - 'tests/test-gateway-e2e.sh'
              - 'tests/litellm-config-mock.yaml'
              - 'docker-compose.mock.yml'
              - 'tests/mock-upstream/**'
              - 'tests/mock-policy-engine/**'
            hotspot:
              - 'services/translator/**'
              - 'litellm-config.yaml'
              - 'docker-compose*.yml'
              - 'Dockerfile*'
              - 'cliproxy-setup.sh'
              - 'dev-env.sh'
      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: |
          sudo rm -rf services/translator/__pycache__ || true
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  lint-and-syntax:
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
          sudo mkdir -p /var/cache/ai-gateway/{pip,buildkit}
          sudo chown -R "$(id -u)":"$(id -g)" /var/cache/ai-gateway || true
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-venv
        with:
          extra-packages: ruff pyyaml pydantic pytest
      - name: Lint with ruff
        run: .venv-ci/bin/ruff check services/translator/main.py tests/mock-upstream/app.py
      - name: Format check with ruff
        run: .venv-ci/bin/ruff format --check services/translator/main.py tests/mock-upstream/app.py
      - name: Shell syntax check
        run: |
          bash -n cliproxy-setup.sh
          bash -n db/apply-migrations.sh
          bash -n dev-env.sh
          bash -n gen-client-config.sh
          bash -n scripts/ci-build-mock-services.sh
          bash -n scripts/ci-free-mock-host-ports.sh
          bash -n tests/test-multi-repo-isolation.sh
          bash -n tests/test-gateway-e2e.sh
          bash -n tests/test-sync-models-probe.sh
      - name: sync-models probe regression tests
        run: |
          .venv-ci/bin/python -m pytest tests/test_sync_models_probe_classify.py -v
          bash tests/test-sync-models-probe.sh
      - name: Validate litellm-config.yaml
        run: |
          python3 - <<'PY'
          import sys, yaml
          with open("litellm-config.yaml") as f:
              data = yaml.safe_load(f)
          if not isinstance(data, dict):
              print("Config root must be a YAML mapping", file=sys.stderr)
              sys.exit(1)
          errors = []
          for idx, entry in enumerate(data.get("model_list") or []):
              if not isinstance(entry, dict):
                  errors.append(f"model_list[{idx}] must be a dict")
                  continue
              if "model_name" not in entry:
                  errors.append(f"model_list[{idx}] missing 'model_name'")
              if "litellm_params" not in entry:
                  name = entry.get("model_name", "?")
                  errors.append(f"model_list[{idx}] ({name!r}) missing 'litellm_params'")
          if errors:
              for e in errors:
                  print(f"  • {e}", file=sys.stderr)
              sys.exit(1)
          print(f"✓ litellm-config.yaml: {len(data.get('model_list') or [])} models validated")
          PY
      - name: Validate policy-profiles.yaml
        run: PYTHONPATH=services/translator .venv-ci/bin/python3 scripts/validate_policy_profiles.py
      - name: Check for hardcoded API keys
        run: CHECK_ALL=1 bash .githooks/prevent-hardcoded-keys.sh
      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: |
          sudo rm -rf services/translator/__pycache__ || true
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  build-translator:
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
          sudo mkdir -p /var/cache/ai-gateway/{pip,buildkit}
          sudo chown -R "$(id -u)":"$(id -g)" /var/cache/ai-gateway || true
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: ./.github/actions/build-docker-cached
        with:
          context: ./services/translator
          tags: ai-translator-test:latest
          scope: translator
      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  unit-tests:
    needs: build-translator
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
          sudo mkdir -p /var/cache/ai-gateway/{pip,buildkit}
          sudo chown -R "$(id -u)":"$(id -g)" /var/cache/ai-gateway || true
      - uses: actions/checkout@v4
      - name: Run translator unit tests (parallel)
        run: docker run --rm ai-translator-test:latest sh -c 'pytest test_translator*.py -n auto -v'
      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  litellm-reloader-tests:
    needs: changes
    if: >
      needs.changes.outputs.litellm_reloader == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
          sudo mkdir -p /var/cache/ai-gateway/{pip,buildkit}
          sudo chown -R "$(id -u)":"$(id -g)" /var/cache/ai-gateway || true
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-venv
      - name: Run litellm-reloader unit tests
        run: .venv-ci/bin/python -m unittest discover -s services/litellm-reloader -p 'test_*.py' -v
      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  credential-prober:
    needs: changes
    if: >
      needs.changes.outputs.credential_prober == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
          sudo mkdir -p /var/cache/ai-gateway/{pip,buildkit}
          sudo chown -R "$(id -u)":"$(id -g)" /var/cache/ai-gateway || true
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-venv
        with:
          requirements-files: services/credential-prober/requirements-test.txt
      - name: Run credential-prober unit tests
        run: .venv-ci/bin/python -m unittest discover -s services/credential-prober -p 'test_*.py' -v
      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  multi-repo-isolation:
    needs: changes
    if: >
      needs.changes.outputs.isolation == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
          sudo mkdir -p /var/cache/ai-gateway/{pip,buildkit}
          sudo chown -R "$(id -u)":"$(id -g)" /var/cache/ai-gateway || true
      - uses: actions/checkout@v4
      - name: Install direnv
        run: sudo apt-get update && sudo apt-get install -y direnv
      - name: Setup mock organizational structure
        run: |
          sudo rm -rf /tmp/mock-repos
          mkdir -p /tmp/mock-repos
          for repo in ai-gateway homelab-gitops amazon_returns cloudflare_access_automation gmail-generator amazon-returns-cdp cursor labels; do
              mkdir -p "/tmp/mock-repos/$repo"
              echo 'dotenv' > "/tmp/mock-repos/$repo/.envrc"
              echo "export CODEX_HOME=\"\$HOME/.codex-repos/$repo\"" >> "/tmp/mock-repos/$repo/.envrc"
              direnv allow "/tmp/mock-repos/$repo"
              if [[ "$repo" == "ai-gateway" || "$repo" == "homelab-gitops" ]]; then
                  mkdir -p "$HOME/.codex-repos/$repo"
                  echo 'openai_base_url = "http://localhost:4000"' > "$HOME/.codex-repos/$repo/config.toml"
                  echo 'approval_policy = "always"' >> "$HOME/.codex-repos/$repo/config.toml"
              fi
          done
          for repo in ai-gateway homelab-gitops amazon_returns cloudflare_access_automation; do
              echo "OPENAI_API_KEY=mock-key-openai" > "/tmp/mock-repos/$repo/.env"
              echo "ANTHROPIC_API_KEY=mock-key-anthropic" >> "/tmp/mock-repos/$repo/.env"
              echo "GEMINI_API_KEY=mock-key-gemini" >> "/tmp/mock-repos/$repo/.env"
          done
      - name: Run isolation tests
        run: |
          eval "$(direnv hook bash)"
          REPOS_BASE=/tmp/mock-repos bash tests/test-multi-repo-isolation.sh
      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  mock-integration:
    concurrency:
      group: ci-docker-host-ports
      cancel-in-progress: false
    needs: [changes, lint-and-syntax, unit-tests, build-translator]
    if: >
      needs.lint-and-syntax.result == 'success' &&
      needs.unit-tests.result == 'success' &&
      (
        needs.changes.outputs.runtime == 'true' ||
        needs.changes.outputs.integration_tests == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
          sudo mkdir -p /var/cache/ai-gateway/{pip,buildkit}
          sudo chown -R "$(id -u)":"$(id -g)" /var/cache/ai-gateway || true
      - uses: actions/checkout@v4
      - name: Teardown stale mock stacks (fresh DB)
        env:
          CI_MOCK_FRESH_DB: "1"
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y psmisc
          bash scripts/ci-free-mock-host-ports.sh "$GITHUB_WORKSPACE"
      - uses: ./.github/actions/setup-python-venv
        with:
          requirements-files: tests/integration/requirements.txt
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Setup environment file
        run: |
          cp .env.example .env
          echo "LITELLM_MASTER_KEY=sk-ci-mock" >> .env
          echo "CLIPROXY_API_KEY=mock-key" >> .env
      - name: Build compose services (path-filtered, Buildx cache)
        env:
          BUILD_CLIPROXY: ${{ needs.changes.outputs.cliproxy == 'true' || github.event_name == 'workflow_dispatch' }}
          BUILD_POLICY: ${{ needs.changes.outputs.policy_engine == 'true' || github.event_name == 'workflow_dispatch' }}
        run: bash scripts/ci-build-mock-services.sh
      - name: Start mock stack
        env:
          TRANSLATOR_IMAGE: ai-translator-test:latest
          CLIPROXY_DEV_CONFIG: ${{ github.workspace }}/tests/cliproxy-config-ci.yaml
          DEV_TRANSLATOR_PORT: "4010"
          DEV_POLICY_ENGINE_PORT: "18080"
          LITELLM_MIGRATIONS: "None"
          CI_MOCK_FRESH_DB: "1"
        run: |
          bash scripts/ci-free-mock-host-ports.sh "$GITHUB_WORKSPACE"
          docker compose \
            -f docker-compose.dev.yml -f docker-compose.mock.yml \
            -p aidevmock \
            up -d postgres redis
          for i in {1..24}; do
            docker exec aidevmock-postgres-1 pg_isready -U postgres >/dev/null 2>&1 && break
            [ "$i" -eq 24 ] && { echo "postgres never ready"; exit 1; }
            sleep 5
          done
          bash scripts/load-mock-data.sh aidevmock-postgres-1
          bash db/apply-migrations.sh aidevmock-postgres-1
          docker compose \
            -f docker-compose.dev.yml -f docker-compose.mock.yml \
            -p aidevmock \
            up -d cliproxy litellm
          echo "Waiting for LiteLLM readiness..."
          for i in {1..36}; do
            if curl -sf http://localhost:4011/health/readiness >/dev/null; then
              echo "LiteLLM ready"
              break
            fi
            LITELLM_CID="$(docker compose -f docker-compose.dev.yml -f docker-compose.mock.yml -p aidevmock ps -q litellm || true)"
            if [ -n "$LITELLM_CID" ] && [ "$(docker inspect -f '{{.State.Status}}' "$LITELLM_CID" 2>/dev/null || true)" = "exited" ]; then
              docker compose -f docker-compose.dev.yml -f docker-compose.mock.yml -p aidevmock logs --no-color --tail 200 litellm || true
              exit 1
            fi
            if [ "$i" -eq 36 ]; then
              docker compose -f docker-compose.dev.yml -f docker-compose.mock.yml -p aidevmock logs litellm || true
              exit 1
            fi
            sleep 5
          done
          docker compose \
            -f docker-compose.dev.yml -f docker-compose.mock.yml \
            -p aidevmock \
            up -d --no-build translator
      - name: Wait for translator health
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:4010/health >/dev/null && exit 0
            sleep 2
          done
          exit 1
      - name: Run mock-tier pytest
        run: |
          GATEWAY_URL=http://localhost:4010 LITELLM_MASTER_KEY=sk-ci-mock ALLOW_MODEL_SKIP=0 \
            .venv-ci/bin/python -m pytest tests/integration/ -m mock -v
      - name: Run shell E2E smoke (CI mock mode)
        run: GATEWAY_E2E_CI=1 GATEWAY_URL=http://localhost:4010 bash tests/test-gateway-e2e.sh
      - name: Dump logs and tear down
        if: always()
        env:
          CI_MOCK_FRESH_DB: "1"
        run: |
          docker compose -f docker-compose.dev.yml -f docker-compose.mock.yml -p aidevmock logs || true
          bash scripts/ci-free-mock-host-ports.sh "$GITHUB_WORKSPACE"
      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  # Gate C paused pending e2e refactor — use run-e2e label or workflow_dispatch
  real-provider-e2e:
    concurrency:
      group: ci-docker-host-ports
      cancel-in-progress: false
    needs: [changes, lint-and-syntax, unit-tests]
    if: >
      needs.lint-and-syntax.result == 'success' &&
      needs.unit-tests.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' ||
        contains(github.event.pull_request.labels.*.name, 'run-e2e')
      )
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
          sudo mkdir -p /var/cache/ai-gateway/{pip,buildkit}
          sudo chown -R "$(id -u)":"$(id -g)" /var/cache/ai-gateway || true
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-venv
        with:
          requirements-files: tests/integration/requirements.txt
      - name: Setup environment file
        run: cp .env.example .env
      - name: Seed real OAuth creds
        run: |
          mkdir -p "$HOME/.cli-proxy-api"
          if [ -n "${{ secrets.CLIPROXY_AUTH_TAR_B64 }}" ]; then
            echo "${{ secrets.CLIPROXY_AUTH_TAR_B64 }}" | base64 -d | tar -xz -C "$HOME/.cli-proxy-api"
            echo "✓ seeded OAuth creds"
          else
            echo "::warning::No CLIPROXY_AUTH_TAR_B64 secret; real-provider tests will skip."
          fi
      - name: Teardown stale dev slot 1
        run: ./dev-env.sh stop 1 || true
      - name: Free dev slot ports (avoid stable :8080 collision)
        run: |
          ./dev-env.sh stop 1 || true
          bash scripts/ci-free-mock-host-ports.sh "$GITHUB_WORKSPACE" || true
      - name: Build and Start Gateway Stack
        run: |
          export CLIPROXY_DEV_CONFIG="$PWD/tests/cliproxy-config-ci.yaml"
          export CLIPROXY_BUILD_CONTEXT="$PWD"
          export CLIPROXY_DOCKERFILE="Dockerfile.cliproxy"
          ./dev-env.sh start 1
      - name: Wait for translator health
        run: |
          for i in {1..36}; do
            curl -sf http://localhost:4010/health >/dev/null && exit 0
            sleep 5
          done
          docker compose -f docker-compose.dev.yml -p aidev1 logs --no-color --tail 200 translator || true
          exit 1
      - name: Run real-provider smoke E2E
        run: |
          set -a
          . ./.env
          set +a
          PATH="${GITHUB_WORKSPACE}/.venv-ci/bin:$PATH" \
            GATEWAY_URL=http://localhost:4010 \
            LITELLM_MASTER_KEY="${LITELLM_MASTER_KEY}" \
            python3 -m pytest tests/integration/ -m "integration and smoke" -v
      - name: Stop services
        if: always()
        run: |
          docker compose -f docker-compose.dev.yml -p aidev1 logs || true
          ./dev-env.sh stop 1
      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
