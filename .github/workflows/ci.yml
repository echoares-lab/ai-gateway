name: CI Suite

env:
  # Prevent root-owned __pycache__ files on self-hosted runners
  PYTHONDONTWRITEBYTECODE: "1"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    # 'labeled' lets adding the run-e2e label trigger the gated E2E job
    # without needing a new commit.
    types: [ opened, synchronize, reopened, labeled ]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: self-hosted
    outputs:
      runtime: ${{ steps.filter.outputs.runtime }}
      isolation: ${{ steps.filter.outputs.isolation }}
      credential_prober: ${{ steps.filter.outputs.credential_prober }}
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            runtime:
              - 'services/**'
              - 'tests/**'
              - 'docker-compose*.yml'
              - 'litellm-config.yaml'
              - 'config/**'
              - 'scripts/**'
              - 'Dockerfile*'
              - '*.sh'
              - 'Makefile'
              - 'db/**'
              - '.github/workflows/**'
            isolation:
              - 'tests/test-multi-repo-isolation.sh'
              - 'dev-env.sh'
              - 'cliproxy-setup.sh'
              - 'gen-client-config.sh'
            credential_prober:
              - 'services/credential-prober/**'

      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: |
          sudo rm -rf services/translator/__pycache__ || true
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  lint-and-syntax:
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
      - uses: actions/checkout@v4
      - name: Ensure Python venv (PEP 668 / self-hosted)
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3-venv
      - name: Install dependencies
        run: |
          python3 -m venv .venv-ci
          .venv-ci/bin/pip install ruff pyyaml
      - name: Lint with ruff
        run: .venv-ci/bin/ruff check services/translator/translator.py tests/mock-upstream/app.py
      - name: Format check with ruff
        run: .venv-ci/bin/ruff format --check services/translator/translator.py tests/mock-upstream/app.py
      - name: Shell syntax check
        run: |
          bash -n cliproxy-setup.sh
          bash -n db/apply-migrations.sh
          bash -n dev-env.sh
          bash -n gen-client-config.sh
          bash -n tests/test-multi-repo-isolation.sh
          bash -n tests/test-gateway-e2e.sh
      - name: Validate litellm-config.yaml
        run: |
          python3 - <<'PY'
          import sys, yaml

          with open("litellm-config.yaml") as f:
              try:
                  data = yaml.safe_load(f)
              except yaml.YAMLError as e:
                  print(f"YAML syntax error: {e}", file=sys.stderr)
                  sys.exit(1)

          if not isinstance(data, dict):
              print("Config root must be a YAML mapping", file=sys.stderr)
              sys.exit(1)

          errors = []
          for idx, entry in enumerate(data.get("model_list") or []):
              if not isinstance(entry, dict):
                  errors.append(f"model_list[{idx}] must be a dict")
                  continue
              if "model_name" not in entry:
                  errors.append(f"model_list[{idx}] missing 'model_name'")
              if "litellm_params" not in entry:
                  name = entry.get("model_name", "?")
                  errors.append(f"model_list[{idx}] ({name!r}) missing 'litellm_params'")

          if errors:
              print(f"Schema validation failed — {len(errors)} error(s):", file=sys.stderr)
              for e in errors:
                  print(f"  • {e}", file=sys.stderr)
              sys.exit(1)

          print(f"✓ litellm-config.yaml: YAML syntax OK, {len(data.get('model_list') or [])} models validated")
          PY

      - name: Validate policy-profiles.yaml
        run: |
          .venv-ci/bin/pip install pydantic
          PYTHONPATH=services/policy-engine python3 scripts/validate_policy_profiles.py

      - name: Check for hardcoded API keys
        run: |
          if grep -E 'api_key:\s+[a-zA-Z0-9-]{20,}' litellm-config.yaml | grep -v 'os.environ'; then
            echo "❌ Hardcoded API key detected in litellm-config.yaml"
            exit 1
          fi
          echo "✓ No hardcoded API keys found"

      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: |
          sudo rm -rf services/translator/__pycache__ || true
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  unit-tests:
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
      - uses: actions/checkout@v4
      - name: Build translator image locally
        run: |
          docker build -t ai-translator-test:latest ./services/translator
      - name: Run unit tests inside container (parallel)
        run: |
          docker run --rm ai-translator-test:latest sh -c 'pytest test_translator*.py -n auto -v'

      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: |
          sudo rm -rf services/translator/__pycache__ || true
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  credential-prober:
    needs: changes
    if: >
      needs.changes.outputs.credential_prober == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
      - uses: actions/checkout@v4
      - name: Ensure Python venv (PEP 668 / self-hosted)
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3-venv
      - name: Install credential-prober test dependencies
        run: |
          python3 -m venv .venv-ci
          .venv-ci/bin/pip install -r services/credential-prober/requirements-test.txt
      - name: Run credential-prober unit tests
        run: |
          .venv-ci/bin/python -m unittest discover -s services/credential-prober -p 'test_*.py' -v

      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: |
          sudo rm -rf services/translator/__pycache__ || true
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  multi-repo-isolation:
    needs: changes
    if: >
      needs.changes.outputs.isolation == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
      - uses: actions/checkout@v4
      - name: Install direnv
        run: sudo apt-get update && sudo apt-get install -y direnv
      - name: Setup mock organizational structure
        run: |
          sudo rm -rf /tmp/mock-repos
          mkdir -p /tmp/mock-repos
          for repo in ai-gateway homelab-gitops amazon_returns cloudflare_access_automation gmail-generator amazon-returns-cdp cursor labels; do
              mkdir -p "/tmp/mock-repos/$repo"
              echo 'dotenv' > "/tmp/mock-repos/$repo/.envrc"
              echo "export CODEX_HOME=\"\$HOME/.codex-repos/$repo\"" >> "/tmp/mock-repos/$repo/.envrc"
              direnv allow "/tmp/mock-repos/$repo"

              if [[ "$repo" == "ai-gateway" || "$repo" == "homelab-gitops" ]]; then
                  mkdir -p "$HOME/.codex-repos/$repo"
                  echo 'openai_base_url = "http://localhost:4000"' > "$HOME/.codex-repos/$repo/config.toml"
                  echo 'approval_policy = "always"' >> "$HOME/.codex-repos/$repo/config.toml"
              fi
          done

          for repo in ai-gateway homelab-gitops amazon_returns cloudflare_access_automation; do
              echo "OPENAI_API_KEY=mock-key-openai" > "/tmp/mock-repos/$repo/.env"
              echo "ANTHROPIC_API_KEY=mock-key-anthropic" >> "/tmp/mock-repos/$repo/.env"
              echo "GEMINI_API_KEY=mock-key-gemini" >> "/tmp/mock-repos/$repo/.env"
          done
      - name: Run isolation tests
        run: |
          eval "$(direnv hook bash)"
          REPOS_BASE=/tmp/mock-repos bash tests/test-multi-repo-isolation.sh

      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: |
          sudo rm -rf services/translator/__pycache__ || true
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  # Gate B: real translator + litellm + canned mock upstream (no OAuth, no real LLM).
  mock-integration:
    needs: changes
    if: >
      needs.changes.outputs.runtime == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
      - uses: actions/checkout@v4
      - name: Ensure Python venv (PEP 668 / self-hosted)
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3-venv
      - name: Install pytest dependencies
        run: |
          python3 -m venv .venv-ci
          .venv-ci/bin/pip install -r tests/integration/requirements.txt
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build translator image (reuse in compose, skip rebuild)
        uses: docker/build-push-action@v5
        with:
          context: ./services/translator
          load: true
          tags: ai-translator-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Setup environment file
        run: |
          cp .env.example .env
          echo "LITELLM_MASTER_KEY=sk-ci-mock" >> .env
          echo "CLIPROXY_API_KEY=mock-key" >> .env
      - name: Start mock stack (translator + litellm + postgres + MOCK cliproxy + policy-engine)
        env:
          TRANSLATOR_IMAGE: ai-translator-test:latest
          CLIPROXY_DEV_CONFIG: ${{ github.workspace }}/tests/cliproxy-config-ci.yaml
          DEV_TRANSLATOR_PORT: "4010"
          DEV_POLICY_ENGINE_PORT: "8080"
          LITELLM_MIGRATIONS: "None"
        run: |
          # Reuse aidevmock Postgres volume on self-hosted runners (avoid ~7m Prisma migrations each job).
          docker compose \
            -f docker-compose.dev.yml -f docker-compose.mock.yml \
            -p aidevmock down || true
          docker compose \
            -f docker-compose.dev.yml -f docker-compose.mock.yml \
            -p aidevmock \
            build postgres cliproxy litellm policy-engine
          docker compose \
            -f docker-compose.dev.yml -f docker-compose.mock.yml \
            -p aidevmock \
            up -d postgres cliproxy litellm policy-engine
          echo "Waiting for LiteLLM readiness (fresh Postgres migrations)..."
          # proxy_extras baseline + 123 migrations on a fresh CI Postgres volume can exceed 7.5m.
          for i in {1..180}; do
            if curl -sf http://localhost:4011/health/readiness >/dev/null; then
              echo "LiteLLM ready"
              break
            fi
            LITELLM_CID="$(docker compose -f docker-compose.dev.yml -f docker-compose.mock.yml -p aidevmock ps -q litellm || true)"
            if [ -n "$LITELLM_CID" ] && [ "$(docker inspect -f '{{.State.Status}}' "$LITELLM_CID" 2>/dev/null || true)" = "exited" ]; then
              echo "LiteLLM container exited early (cid=$LITELLM_CID). Dumping recent logs:"
              docker compose -f docker-compose.dev.yml -f docker-compose.mock.yml -p aidevmock logs --no-color --tail 200 litellm || true
              exit 1
            fi
            if docker compose -f docker-compose.dev.yml -f docker-compose.mock.yml -p aidevmock logs --no-color --tail 200 litellm 2>/dev/null | grep -Eq 'P3005|Prisma.*(panic|fatal|error)|database schema is not empty'; then
              echo "Detected Prisma/LiteLLM fatal error during startup. Dumping recent logs:"
              docker compose -f docker-compose.dev.yml -f docker-compose.mock.yml -p aidevmock logs --no-color --tail 200 litellm || true
              exit 1
            fi
            if [ "$i" -eq 180 ]; then
              echo "LiteLLM never became ready"
              docker compose -f docker-compose.dev.yml -f docker-compose.mock.yml -p aidevmock logs litellm || true
              exit 1
            fi
            echo "waiting for litellm ($i/180)..."
            sleep 5
          done
          docker compose \
            -f docker-compose.dev.yml -f docker-compose.mock.yml \
            -p aidevmock \
            up -d --no-build translator
      - name: Wait for translator health
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:4010/health >/dev/null && { echo "ready"; exit 0; }
            echo "waiting for translator ($i/30)..."
            sleep 2
          done
          echo "translator never became healthy"; exit 1
      - name: Run mock-tier pytest
        run: |
          GATEWAY_URL=http://localhost:4010 LITELLM_MASTER_KEY=sk-ci-mock ALLOW_MODEL_SKIP=0 \
            POLICY_ENGINE_URL=http://localhost:8080 \
            .venv-ci/bin/python -m pytest tests/integration/ -m mock -v
      - name: Run shell E2E smoke (CI mock mode)
        run: |
          GATEWAY_E2E_CI=1 GATEWAY_URL=http://localhost:4010 bash tests/test-gateway-e2e.sh
      - name: Dump logs and tear down
        if: always()
        run: |
          docker compose -f docker-compose.dev.yml -f docker-compose.mock.yml -p aidevmock logs || true
          docker compose -f docker-compose.dev.yml -f docker-compose.mock.yml -p aidevmock down

      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: |
          sudo rm -rf services/translator/__pycache__ || true
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true

  # Gate C: builds the CLIProxy fork and hits REAL providers. Not a required check.
  real-provider-e2e:
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e')
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
      - uses: actions/checkout@v4
      - name: Ensure Python venv (PEP 668 / self-hosted)
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3-venv
      - name: Install pytest dependencies
        run: |
          python3 -m venv .venv-ci
          .venv-ci/bin/pip install -r tests/integration/requirements.txt
      - name: Setup environment file
        run: cp .env.example .env
      - name: Seed real OAuth creds
        run: |
          mkdir -p "$HOME/.cli-proxy-api"
          if [ -n "${{ secrets.CLIPROXY_AUTH_TAR_B64 }}" ]; then
            echo "${{ secrets.CLIPROXY_AUTH_TAR_B64 }}" | base64 -d | tar -xz -C "$HOME/.cli-proxy-api"
            echo "✓ seeded OAuth creds"
          else
            echo "::warning::No CLIPROXY_AUTH_TAR_B64 secret; real-provider tests will skip."
          fi
      - name: Build and Start Gateway Stack
        run: |
          export CLIPROXY_DEV_CONFIG="$PWD/tests/cliproxy-config-ci.yaml"
          export CLIPROXY_BUILD_CONTEXT="$PWD"
          export CLIPROXY_DOCKERFILE="Dockerfile.cliproxy"
          ./dev-env.sh start 1
      - name: Wait for services to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:4010/health >/dev/null; then
              echo "✓ Translator is ready"
              break
            fi
            echo "Waiting for translator (retry $i/30)..."
            sleep 3
          done
      - name: Run real-provider smoke E2E
        run: |
          ./dev-env.sh test 1 -- -m "integration and smoke"
      - name: Stop services
        if: always()
        run: |
          docker compose -f docker-compose.dev.yml -p aidev1 logs || true
          ./dev-env.sh stop 1

      - name: Fix workspace permissions (self-hosted)
        if: always()
        run: |
          sudo rm -rf services/translator/__pycache__ || true
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
