name: Hotspot E2E Reminder

# Suggests Gate C (run-e2e label) when a PR touches high-risk paths.
on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  pull-requests: write
  contents: read

jobs:
  hotspot-check:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hotspot:
              - 'services/translator/translator.py'
              - 'litellm-config.yaml'
              - 'docker-compose.yml'
              - 'docker-compose.dev.yml'
              - 'Dockerfile.cliproxy'
              - 'cliproxy-setup.sh'
              - 'dev-env.sh'
      - name: Remind to run Gate C
        if: steps.filter.outputs.hotspot == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- hotspot-e2e-reminder -->';
            const body = `${marker}
            ### Gate C recommended (high-risk paths changed)

            This PR touches auth/routing/provider/config hotspots. Before merge, consider:

            - Add the \`run-e2e\` label to trigger CI \`real-provider-e2e\`, or
            - Run locally: \`make test-e2e\`

            See \`TESTING_AND_PROMOTION_POLICY.md\` and \`REPO_IMPROVEMENT_APPENDIX.md\`.
            `;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
