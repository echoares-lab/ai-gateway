name: Hotspot E2E Reminder

# Suggests opt-in Gate C (run-e2e label) when a PR touches high-risk paths.
# Gate C is not required for merge pending e2e refactor.
on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ main ]

permissions:
  pull-requests: write
  contents: read

jobs:
  hotspot-check:
    name: "Reminder :: Hotspot Check"
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hotspot:
              - 'services/translator/**'
              - 'litellm-config.yaml'
              - 'docker-compose*.yml'
              - 'Dockerfile*'
              - 'cliproxy-setup.sh'
              - 'dev-env.sh'
      - name: Remind to run Gate C (opt-in)
        if: steps.filter.outputs.hotspot == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- hotspot-e2e-reminder -->';
            const body = `${marker}
            ### Gate C recommended (high-risk paths changed)

            This PR touches auth/routing/provider/config hotspots. Gate C is **opt-in** (not required to merge) pending an e2e refactor. Before merge, consider:

            - Add the \`run-e2e\` label to trigger CI \`real-provider-e2e\`, or
            - Run \`make test-e2e\` locally against a dev slot

            See \`docs/TESTING.md\` and \`REPO_IMPROVEMENT_APPENDIX.md\`.
            `;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
