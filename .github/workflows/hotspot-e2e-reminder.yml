name: Hotspot E2E Reminder

# Reminds authors that Gate C (real-provider-e2e) is required when hotspot paths change.
on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ main ]

permissions:
  pull-requests: write
  contents: read

jobs:
  hotspot-check:
    runs-on: self-hosted
    steps:
      - name: Pre-clean workspace (self-hosted)
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE" || true
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* || true
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hotspot:
              - 'services/translator/**'
              - 'litellm-config.yaml'
              - 'docker-compose*.yml'
              - 'Dockerfile*'
              - 'cliproxy-setup.sh'
              - 'dev-env.sh'
      - name: Remind about required Gate C
        if: steps.filter.outputs.hotspot == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- hotspot-e2e-reminder -->';
            const body = `${marker}
            ### Gate C required (hotspot paths changed)

            This PR touches auth/routing/provider/config hotspots. CI \`real-provider-e2e\` runs automatically and is a **required** check.

            - Ensure OAuth creds are available on the self-hosted runner (\`CLIPROXY_AUTH_TAR_B64\` secret)
            - Or add the \`run-e2e\` label to re-trigger after cred refresh
            - Local fallback: \`make test-e2e\`

            See \`docs/TESTING.md\` and \`REPO_IMPROVEMENT_APPENDIX.md\`.
            `;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
