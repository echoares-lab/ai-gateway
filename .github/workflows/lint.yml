name: Lint & Test

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check services/translator/translator.py
      - name: Format check with ruff
        run: ruff format --check services/translator/translator.py

  yaml-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Validate litellm-config.yaml
        run: python3 -c "import yaml; yaml.safe_load(open('litellm-config.yaml'))"
      - name: Check for hardcoded API keys
        run: |
          if grep -E 'api_key:\s+[a-zA-Z0-9-]{20,}' litellm-config.yaml | grep -v 'os.environ'; then
            echo "❌ Hardcoded API key detected"
            exit 1
          fi
          echo "✓ No hardcoded API keys"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pytest pytest-asyncio
      - name: Run unit tests
        run: |
          cd services/translator
          pip install -e .
          pytest test_translator.py -v
