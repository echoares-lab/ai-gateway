name: Build Docker image (cached)
description: Build and load a Docker image with a BuildKit registry-backed layer cache (Nexus)

inputs:
  context:
    description: Docker build context path
    required: true
  tags:
    description: Image tag(s), comma-separated
    required: true
  scope:
    description: Cache scope — used as the cache image tag (isolates layer caches per service)
    required: true
  push:
    description: Push image to registry
    required: false
    default: "false"
  build-args:
    description: Build-time variables
    required: false
  cache-image:
    description: Registry repo holding the BuildKit layer cache (one tag per scope)
    required: false
    default: nexus-docker.infra.plexplease.com/ai-gateway/buildcache

runs:
  using: composite
  steps:
    - uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        load: true
        push: ${{ inputs.push == 'true' }}
        tags: ${{ inputs.tags }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=registry,ref=${{ inputs.cache-image }}:${{ inputs.scope }}
        cache-to: type=registry,ref=${{ inputs.cache-image }}:${{ inputs.scope }},mode=max
