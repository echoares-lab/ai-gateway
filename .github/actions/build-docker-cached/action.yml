name: Build Docker image (cached)
description: Build and load a Docker image with GHA + local BuildKit cache

inputs:
  context:
    description: Docker build context path
    required: true
  tags:
    description: Image tag(s), comma-separated
    required: true
  scope:
    description: GHA cache scope (isolates layer caches per service)
    required: true
  push:
    description: Push image to registry
    required: false
    default: "false"
  build-args:
    description: Build-time variables
    required: false

runs:
  using: composite
  steps:
    - uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        load: true
        push: ${{ inputs.push == 'true' }}
        tags: ${{ inputs.tags }}
        build-args: ${{ inputs.build-args }}
        cache-from: |
          type=gha,scope=${{ inputs.scope }}
          type=local,src=/var/cache/ai-gateway/buildkit
        cache-to: |
          type=gha,mode=max,scope=${{ inputs.scope }}
          type=local,dest=/var/cache/ai-gateway/buildkit,mode=max
