name: Repo improvement
description: Propose or approve a security, performance, reliability, code-health, or feature improvement
title: "[type] short summary"
labels:
  - status:proposed
body:
  - type: dropdown
    id: work_type
    attributes:
      label: Work type
      options:
        - type:security
        - type:performance
        - type:reliability
        - type:code-health
        - type:test
        - type:observability
        - type:docs
        - type:dx
        - type:feature
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph summary of the improvement
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is wrong, risky, slow, brittle, or missing?
    validations:
      required: true

  - type: textarea
    id: why_now
    attributes:
      label: Why now
      description: Why should this be prioritized now?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope for this issue?
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should explicitly not be changed?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true to consider this issue done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: tests
    attributes:
      label: Required tests
      description: Which gates apply? See TESTING_AND_PROMOTION_POLICY.md (A/B/C/D)
      placeholder: |
        Gate A: make test-unit
        Gate B: make test-mock (required for runtime changes)
        Gate C: run-e2e label (high-risk only)
        Gate D: cliproxy-setup.sh test on stable (post-merge)
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks / rollback notes
      description: What could go wrong? How would you roll it back?

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Link required issues or bundle/epic issue numbers
      placeholder: |
        Depends on: #123
        Blocks: #124
        Bundle: #120

  - type: textarea
    id: files
    attributes:
      label: Affected files / areas
      description: Representative files or subsystems likely to change
      placeholder: |
        - services/gateway-engine/gateway-engine.py
        - cliproxy-setup.sh
        - .github/workflows/lint.yml

  - type: textarea
    id: execution_notes
    attributes:
      label: Execution notes
      description: Optional implementation notes for the agent or maintainer
