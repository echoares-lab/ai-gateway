general_settings:
  forward_client_headers_to_llm_api: true
  store_model_in_db: true
  store_prompts_in_spend_logs: true
  drop_params: true
router_settings:
  enable_pre_call_checks: true
  routing_strategy: latency-based-routing
  routing_strategy_args:
    lowest_latency_buffer: 0.5
    ttl: 300
  allowed_fails: 9999
  cooldown_time: 1
  allowed_fails_policy:
    RateLimitErrorAllowedFails: 2
    InternalServerErrorAllowedFails: 3
    TimeoutErrorAllowedFails: 3
  num_retries: 0
litellm_settings:
  callbacks:
  - langfuse
  success_callback:
  - langfuse
  failure_callback:
  - langfuse
  fallbacks: []
  cache: false
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_AUTH
    ttl: 3600
    supported_call_types:
    - acompletion
    - completion
  mcp_servers:
    mcp-filesystem:
      command: npx
      args:
      - -y
      - '@modelcontextprotocol/server-filesystem'
      - /home/dev/workspace
      - /tmp
    mcp-git:
      command: uvx
      args:
      - mcp-server-git
      - --repository
      - /home/dev/repos/ai-gateway
    mcp-fetch:
      command: npx
      args:
      - -y
      - '@modelcontextprotocol/server-fetch'
    mcp-brave:
      command: npx
      args:
      - -y
      - '@modelcontextprotocol/server-brave'
      env:
        BRAVE_API_KEY: os.environ/BRAVE_API_KEY
    mcp-tavily:
      command: npx
      args:
      - -y
      - '@tavily/mcp-server'
      env:
        TAVILY_API_KEY: os.environ/TAVILY_API_KEY
    mcp-github:
      command: npx
      args:
      - -y
      - '@modelcontextprotocol/server-github'
      env:
        GITHUB_PERSONAL_ACCESS_TOKEN: os.environ/GITHUB_PERSONAL_ACCESS_TOKEN
    mcp-memory:
      command: npx
      args:
      - -y
      - '@modelcontextprotocol/server-memory'
    mcp-sequential-thinking:
      command: npx
      args:
      - -y
      - '@modelcontextprotocol/server-sequential-thinking'
    mcp-postgres:
      command: npx
      args:
      - -y
      - '@modelcontextprotocol/server-postgres'
      - postgresql://mcp_readonly:mcp_readonly_secret@postgres:5432/postgres
  num_retries: 0
