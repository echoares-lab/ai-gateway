    - claude-opus-4-1-20250805:
        ["gemini-3-1-pro", "gemini-3-1-pro-via-gcli", "gpt-5-5"]
    - claude-opus-4-5:
        ["gemini-3-1-pro", "gemini-3-1-pro-via-gcli", "gpt-5-5"]
    - claude-opus-4-5-20251101:
        ["gemini-3-1-pro", "gemini-3-1-pro-via-gcli", "gpt-5-5"]
    - claude-opus-4-6:
