  # Gemini (Google account / Gemini Advanced subscription)
  # Rate limits are the tightest of the three providers:
  #   Pro models:        ~25-50 req/day, ~5 req/min
  #   Flash models:      ~500-1000 req/day, ~15 req/min
  #   Flash-Lite models: ~1000+ req/day, ~30 req/min
  # Pro models WILL 429 under background health checks — disable_background_health_check recommended
  - model_name: gemini-3-1-pro
    litellm_params:
      model: gemini-3.1-pro-preview
      custom_llm_provider: openai
      api_base: http://cliproxy:8317/v1
      api_key: os.environ/CLIPROXY_API_KEY
      max_tokens: 65536
    model_info:
      base_model: gemini-3.1-pro-preview
      input_cost_per_token: 2.00e-06
      output_cost_per_token: 1.20e-05
      cache_read_input_token_cost: 2.00e-07
      max_input_tokens: 1048576
      max_output_tokens: 65536
      supports_prompt_caching: true
      supports_vision: true
      supports_function_calling: true
      disable_background_health_check: true  # ~25-50 req/day limit; health checks waste quota

