general_settings:
  forward_client_headers_to_llm_api: true
  store_model_in_db: true
  store_prompts_in_spend_logs: true
  drop_params: true
  # --- Background model health checks ---
  # Probes each model on a schedule; results appear in LiteLLM UI → Model Health page.
  # Each check sends 1 request (~6-7 tokens in, max_tokens=1 out) per model per interval.
  # With 30 models at 300s interval: ~26 req/5min, ~7500 req/day across all providers.
  # Gemini Pro models are excluded via disable_background_health_check (see model_info above).
  # To enable: uncomment the three lines below and restart LiteLLM.
  #
  # background_health_checks: true
  # health_check_interval: 300        # seconds between full sweeps (default: 300)
  # health_check_concurrency: 5       # max parallel probes (default: all at once)

router_settings:
  # --- Adaptive provider routing (issue #60; design: docs/ADAPTIVE_ROUTING.md) ---
  # Moves routing from purely-static fallback lists toward health/error-aware
  # ordering using LiteLLM-native router controls. Routing logic stays in LiteLLM
  # (not gateway-engine.py) per docs/ARCHITECTURE.md §2.2.

  # Capability fit (context-window / basic capability) pre-filtering. Kept on so
  # a request is never routed to a deployment that cannot serve it.
  enable_pre_call_checks: true

  # Order eligible deployments by observed latency rather than fixed list order,
  # so a slow/degraded provider is deprioritized using passive latency signals
  # (the same signals captured in issue #59).
  routing_strategy: latency-based-routing
  routing_strategy_args:
    # Treat deployments within this latency band as equivalent (seconds), then
    # prefer the lower-latency one. Dampens flapping between similar providers.
    lowest_latency_buffer: 0.5
    ttl: 300  # seconds of latency history considered

  # Cooldown: after a deployment exceeds allowed_fails failures within a minute,
  # remove it from rotation for cooldown_time seconds. Degraded / rate-limited
  # providers are thus deprioritized within their cooldown window and traffic
  # routes to healthy fallback targets automatically (AC: §60).
  allowed_fails: 3
  cooldown_time: 60  # seconds

  # React faster to rate-limit (429) signals than to generic failures: a single
  # 429 burst should cool a provider quickly, while transient content/other
  # errors are more tolerant before cooldown.
  allowed_fails_policy:
    RateLimitErrorAllowedFails: 2
    InternalServerErrorAllowedFails: 3
    TimeoutErrorAllowedFails: 3

  # Bounded automatic retries (with backoff) before falling back to the next
  # capability-correct provider in the fallbacks list.
  num_retries: 2

litellm_settings:
  callbacks: ["langfuse"]
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  # ---------------------------------------------------------------------------
  # Fallback chains — two-tier Gemini routing
  #
  # Gemini model requests:
  #   Tier 1 (antigravity accounts, via cliproxy default routing)
  #     → Tier 2 (gemini-cli accounts, via cliproxy -via-gcli alias routing)
  #       → Claude capability-equivalent
  #         → GPT capability-equivalent
  #
  # Claude / GPT model requests:
  #   Primary provider
  #     → Gemini Tier 1 (antigravity)
  #       → Gemini Tier 2 (gemini-cli)
  #         → other provider equivalent
  #
  # This ensures all Gemini OAuth accounts (both antigravity and gemini-cli)
  # are exhausted before the request is handed to Claude or Codex.
  # ---------------------------------------------------------------------------
  fallbacks:
    # --- Claude → Gemini (both tiers) → GPT ---
    - claude-haiku-4-5:
        ["gemini-3-flash", "gemini-3-flash-via-gcli", "gpt-5-4-mini"]
    - claude-haiku-4-5-20251001:
        ["gemini-3-flash", "gemini-3-flash-via-gcli", "gpt-5-4-mini"]
    - claude-sonnet-4-5:
        ["gemini-3-flash", "gemini-3-flash-via-gcli", "gpt-5-4"]
    - claude-sonnet-4-5-20250929:
        ["gemini-3-flash", "gemini-3-flash-via-gcli", "gpt-5-4"]
    - claude-sonnet-4-6:
        ["gemini-3-flash", "gemini-3-flash-via-gcli", "gpt-5-4"]
    - claude-opus-4-1:
