# docker-compose.mock.yml — mock upstream + mock policy-engine for Gate B.
services:
  postgres:
    volumes:
      - dev_pgdata:/var/lib/postgresql/data
      - ./tests/init-db-mock-ci.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  cliproxy:
    build:
      context: ./tests/mock-upstream
      dockerfile: Dockerfile
    image: ai-mock-upstream:latest
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8317"]
    volumes: []
    environment: {}

  litellm:
    environment:
      LITELLM_MIGRATIONS: ${LITELLM_MIGRATIONS:-}
      # Newer LiteLLM versions may attempt to create a baseline migration when
      # the DB schema isn't empty (Prisma P3005). The default migration path can
      # be read-only inside the container image; force a writable directory.
      LITELLM_MIGRATION_DIR: ${LITELLM_MIGRATION_DIR:-/tmp/litellm_migrations}
    # Fresh Postgres + LiteLLM proxy_extras migrations can exceed dev defaults (~70s).
    healthcheck:
      test:
        [
        "CMD-SHELL",
        "python - <<'PY'
import urllib.request, sys
try:
    r = urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=3)
    sys.exit(0 if 200 <= r.status < 300 else 1)
except Exception:
    sys.exit(1)
PY"
        ]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 120s

  policy-engine:
    build:
      context: ./tests/mock-policy-engine
      dockerfile: Dockerfile
    image: ai-mock-policy-engine:latest
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "${DEV_POLICY_ENGINE_PORT:-8160}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'
import urllib.request, sys
try:
    r = urllib.request.urlopen('http://127.0.0.1:8080/v1/health', timeout=3)
    sys.exit(0 if 200 <= r.status < 300 else 1)
except Exception:
    sys.exit(1)
PY",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  translator:
    # CI: don't block `compose up translator` on LiteLLM health (compose wait can
    # SIGKILL litellm while proxy_extras migrations run on a fresh Postgres volume).
    # !reset drops dev-stack policy-engine dependency; mock tier keeps policy disabled.
    depends_on: !reset
      litellm:
        condition: service_started
      policy-engine:
        condition: service_healthy
    environment:
      POLICY_ENGINE_ENABLED: "true"
      POLICY_ENGINE_URL: http://policy-engine:8080
      POLICY_ENGINE_TIMEOUT_MS: "500"


  cpa-manager:
    image: seakee/cpa-manager:1.5.5
    restart: unless-stopped
    depends_on:
      - cliproxy
    ports:
      - "${DEV_CPA_MANAGER_PORT:-18327}:18317"
    environment:
      HTTP_ADDR: "0.0.0.0:18317"
      USAGE_DB_PATH: "/data/usage.sqlite"
      USAGE_COLLECTOR_MODE: "auto"
    volumes:
      - dev_cpa_data:/data
