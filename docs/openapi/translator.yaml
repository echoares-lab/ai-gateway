openapi: 3.0.3
info:
  title: Translator API
  description: Translation proxy for multiple AI CLI formats to LiteLLM (OpenAI Chat Completions).
  version: 1.0.0
paths:
  /v1/chat/completions:
    post:
      summary: Proxy for Cursor/OpenAI hybrid formats
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                model: {type: string}
                messages: {type: array, items: {type: object}}
            example:
              model: "AI-Gateway:gpt-4"
              messages: [{"role": "user", "content": "Hello!"}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                id: "chatcmpl-123"
                choices: [{"message": {"role": "assistant", "content": "Hello there!"}}]
  /v1beta/models/{model_action}:
    get:
      summary: Get models information
      parameters:
        - name: model_action
          in: path
          required: true
          schema: {type: string}
    post:
      summary: Gemini CLI format proxy
      parameters:
        - name: model_action
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Successful response
  /v1/responses:
    post:
      summary: Codex CLI / OpenAI Responses API proxy
      responses:
        '200':
          description: Successful response
    get:
      summary: Codex WebSocket proxy
      responses:
        '101':
          description: Switching Protocols (WebSocket)
  /v1/messages:
    post:
      summary: Claude / Anthropic Messages API proxy
      responses:
        '200':
          description: Successful response
  /metrics:
    get:
      summary: Prometheus metrics endpoint
      responses:
        '200':
          description: Success
  /admin/status:
    get:
      summary: Read-only operator status aggregator
      responses:
        '200':
          description: admin-console.v1 JSON payload
          content:
            application/json:
              example:
                schema_version: "admin-console.v1"
                panels:
                  token_analytics:
                    status: "ok"
                    data:
                      summary:
                        total_input_tokens: 1250000
                        total_output_tokens: 350000
                        total_tokens: 1600000
  /admin/analytics/tokens:
    get:
      summary: Granular token usage analytics by provider and model
      responses:
        '200':
          description: Token analytics panel
          content:
            application/json:
              example:
                status: "ok"
                source: "translator:/metrics (token counters)"
                data:
                  summary:
                    total_input_tokens: 1250000
                    total_output_tokens: 350000
                    total_tokens: 1600000
                  by_provider:
                    - provider: "anthropic"
                      model_count: 3
                      input_tokens: 600000
                      output_tokens: 150000
                      total_tokens: 750000
                  by_model:
                    - model: "claude-sonnet-4-6"
                      provider: "anthropic"
                      input_tokens: 350000
                      output_tokens: 85000
  /admin/models:
    get:
      summary: List translator-owned model registry records
      responses:
        '200':
          description: Registry models, falling back to parsed LiteLLM config when Postgres is unavailable
          content:
            application/json:
              example:
                source: "postgres:model_registry"
                registry_available: true
                models:
                  - model_id: "claude-sonnet-4-6"
                    provider: "anthropic"
                    family: "anthropic"
                    upstream_model: "claude-sonnet-4.6"
                    litellm_model: "openai/claude-sonnet-4.6"
                    enabled: true
                    status: "UNKNOWN"
                errors: []
    post:
      summary: Create or replace a model registry record
      parameters:
        - name: x-admin-key
          in: header
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            example:
              model_id: "gpt-5-4"
              upstream_model: "gpt-5.4"
              supports_tools: true
      responses:
        '200':
          description: Model upserted
        '403':
          description: Invalid admin key
        '503':
          description: Admin mutations disabled or registry unavailable
  /admin/models/{model_id}:
    get:
      summary: Read one model registry record
      parameters:
        - name: model_id
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Matching model record
        '404':
          description: Model not found
    patch:
      summary: Update one model registry record
      parameters:
        - name: model_id
          in: path
          required: true
          schema: {type: string}
        - name: x-admin-key
          in: header
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            example:
              enabled: true
              status: "HEALTHY"
              cost_tier: 2
      responses:
        '200':
          description: Model updated
        '404':
          description: Model not found
    delete:
      summary: Disable one model registry record
      parameters:
        - name: model_id
          in: path
          required: true
          schema: {type: string}
        - name: hard
          in: query
          required: false
          schema: {type: boolean, default: false}
        - name: x-admin-key
          in: header
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Model disabled or deleted
        '404':
          description: Model not found
  /admin/models/{model_id}/probe:
    post:
      summary: Probe one model and persist normalized probe status
      parameters:
        - name: model_id
          in: path
          required: true
          schema: {type: string}
        - name: x-admin-key
          in: header
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Probe completed and registry probe fields updated
          content:
            application/json:
              example:
                accepted: true
                registry_available: true
                model_id: "gpt-5-4"
                probe_status: "success"
                probe_http_status: 200
                probe_checked_at: "2026-06-06T00:00:00Z"
                model:
                  model_id: "gpt-5-4"
                  provider: "openai"
                  probe_status: "success"
                  probe_http_status: 200
                errors: []
        '403':
          description: Invalid admin key
        '404':
          description: Model not found in registry
        '503':
          description: Admin mutations disabled when TRANSLATOR_ADMIN_KEY is unset
  /admin/models/sync:
    post:
      summary: Import LiteLLM config or CLIProxy discovery into the translator model registry
      parameters:
        - name: x-admin-key
          in: header
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                dry_run:
                  type: boolean
                  default: true
                source:
                  type: string
                  enum: [litellm-config, cliproxy]
                  default: litellm-config
            example:
              dry_run: true
              source: cliproxy
      responses:
        '200':
          description: Import result
          content:
            application/json:
              example:
                dry_run: true
                source: cliproxy
                registry_available: true
                imported_count: 2
                skipped_count: 0
                models:
                  - model_id: "gpt-5-4"
                    provider: "openai"
                    upstream_model: "gpt-5.4"
                    litellm_model: "openai/gpt-5.4"
                    source: "cliproxy"
                diffs:
                  - kind: "add"
                    model_id: "gpt-5-4"
                errors: []
        '503':
          description: Admin mutations disabled when TRANSLATOR_ADMIN_KEY is unset
  /admin/dashboard:
    get:
      summary: Admin console HTML dashboard
      responses:
        '200':
          description: HTML dashboard page
