openapi: 3.0.3
info:
  title: LiteLLM API
  description: LiteLLM gateway API configuration and health.
  version: 1.0.0
paths:
  /health:
    get:
      summary: Health check endpoint
      responses:
        '200':
          description: Health OK
          content:
            application/json:
              example: {"status": "ok"}
  /v1/models:
    get:
      summary: List available models
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {"data": [{"id": "claude-sonnet-4-6"}, {"id": "gpt-5-4"}]}
  /v1/chat/completions:
    post:
      summary: Chat completions endpoint
      requestBody:
        content:
          application/json:
            schema: {type: object}
            example:
              model: "claude-sonnet-4-6"
              messages: [{"role": "user", "content": "Explain quantum computing."}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {"choices": [{"message": {"content": "Quantum computing is..."}}]}
