# Standalone dev stack — NOT an override of docker-compose.yml.
# Run via dev-env.sh, which sets COMPOSE_PROJECT_NAME=aidev<slot> and port env vars.
# Each slot gets its own Docker network (aidev<slot>_default) — no ai_default join.

networks:
  default: {}

volumes:
  dev_auth:    # seeded from ~/.cli-proxy-api at dev-env start; writes stay isolated
  dev_pgdata:  # postgres data for litellm
  dev_cpa_data: # persistent usage analytics for cpa-manager

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
    volumes:
      - dev_pgdata:/var/lib/postgresql/data
      # Bootstrap + pre-migrated LiteLLM schema (see init-db-bootstrap.sql, db/seed-litellm-mock.sql).
      # Gateway tables applied via db/apply-migrations.sh after postgres is up (dev-env.sh).
      - ./init-db-bootstrap.sql:/docker-entrypoint-initdb.d/01-bootstrap.sql:ro
      - ./db/seed-litellm-mock.sql:/docker-entrypoint-initdb.d/02-seed-litellm-mock.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: docker.io/redis:7
    restart: unless-stopped
    command: >
      --requirepass ${REDIS_AUTH:-myredissecret}
      --maxmemory-policy noeviction
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_AUTH:-myredissecret}",
          "ping",
        ]
      interval: 3s
      timeout: 10s
      retries: 10

  policy-engine:
    build:
      context: ./services/policy-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "${DEV_POLICY_ENGINE_PORT:-8090}:8080"
    environment:
      REDIS_URL: redis://:${REDIS_AUTH:-myredissecret}@redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/litellm
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport urllib.request, sys\ntry:\n    r = urllib.request.urlopen('http://127.0.0.1:8080/v1/health', timeout=3)\n    sys.exit(0 if 200 <= r.status < 300 else 1)\nexcept Exception:\n    sys.exit(1)\nPY"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  cliproxy:
    build:
      context: ${CLIPROXY_BUILD_CONTEXT:-/home/dev/repos/CLIProxyAPI}
      dockerfile: ${CLIPROXY_DOCKERFILE:-Dockerfile}
    command: ["./CLIProxyAPI", "--config", "/config/config.yaml"]
    restart: unless-stopped
    volumes:
      - ${CLIPROXY_DEV_CONFIG:-${HOME}/.cliproxy/config.yaml}:/config/config.yaml:ro
      - dev_auth:/home/dev/.cli-proxy-api
    environment:
      MANAGEMENT_PASSWORD: dev-management-key
    ports:
      - "${DEV_CLIPROXY_PORT:-8327}:8317"

  litellm:
    image: ghcr.io/berriai/litellm:v1.87.1@sha256:9de33287d844a164f873479a04eebe065610e131d7e3aaf010f520fb5b4cfd7b
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      cliproxy:
        condition: service_started
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/litellm
      CLIPROXY_API_KEY: ${CLIPROXY_API_KEY}
      DISABLE_CACHE: "true"
      # Skip proxy_extras Prisma migrations on dev/mock stacks (empty bootstrap DB).
      # Smoke/integration tests do not need LiteLLM's admin schema; avoids ~15 min startup.
      LITELLM_MIGRATIONS: ${LITELLM_MIGRATIONS:-None}
      LITELLM_MIGRATION_DIR: ${LITELLM_MIGRATION_DIR:-/tmp/litellm_migrations}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "${DEV_LITELLM_PORT:-4011}:4000"
    healthcheck:
      test:
        [
        "CMD-SHELL",
        "python - <<'PY'\nimport urllib.request, sys\ntry:\n    r = urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=3)\n    sys.exit(0 if 200 <= r.status < 300 else 1)\nexcept Exception:\n    sys.exit(1)\nPY"
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s

  litellm-reloader:
    build:
      context: ./services/litellm-reloader
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - LITELLM_CONTAINER=${COMPOSE_PROJECT_NAME:-aidev1}-litellm-1
    volumes:
      - ./litellm-config.yaml:/config/litellm-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - litellm

  credential-prober:
    build:
      context: ./services/credential-prober
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - CLIPROXY_URL=http://cliproxy:8317
      - CLIPROXY_MANAGEMENT_KEY=${CLIPROXY_MANAGEMENT_KEY:-dev-management-key}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/litellm
      - POLICY_ENGINE_URL=${POLICY_ENGINE_URL:-http://policy-engine:8080}
    depends_on:
      postgres:
        condition: service_healthy
      cliproxy:
        condition: service_started
      policy-engine:
        condition: service_started

  translator:
    image: ${TRANSLATOR_IMAGE:-aidev-translator-local}
    build:
      context: ./services/translator
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 4000 --reload
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
      redis:
        condition: service_healthy
      policy-engine:
        condition: service_healthy
    environment:
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      CLIPROXY_API_KEY: ${CLIPROXY_API_KEY}
      UPSTREAM_TIMEOUT: ${UPSTREAM_TIMEOUT:-30.0}
      LITELLM_CONFIG_PATH: /config/litellm-config.yaml
      DEV_SLOT: ${DEV_SLOT:-1}
      REDIS_URL: redis://:${REDIS_AUTH:-myredissecret}@redis:6379
      POLICY_ENGINE_URL: ${POLICY_ENGINE_URL:-http://policy-engine:8080}
      POLICY_ENGINE_ENABLED: ${POLICY_ENGINE_ENABLED:-false}
      POLICY_ENGINE_TIMEOUT_MS: ${POLICY_ENGINE_TIMEOUT_MS:-100}
    ports:
      - "${DEV_TRANSLATOR_PORT:-4010}:4000"
    volumes:
      - ./services/translator:/app
      # Read-only mount so /admin/status can read configured models/router/fallbacks.
      - ./litellm-config.yaml:/config/litellm-config.yaml:ro

  cpa-manager:
    image: seakee/cpa-manager:1.5.5
    restart: unless-stopped
    depends_on:
      - cliproxy
    ports:
      - "${DEV_CPA_MANAGER_PORT:-18327}:18317"
    environment:
      HTTP_ADDR: "0.0.0.0:18317"
      USAGE_DB_PATH: "/data/usage.sqlite"
      USAGE_COLLECTOR_MODE: "auto"
    volumes:
      - dev_cpa_data:/data
