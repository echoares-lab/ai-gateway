networks:
  default: {}
volumes:
  dev_auth: null
  langfuse_postgres_data: null # Align with docker-compose.yml
  dev_cpa_data: null
services:
  postgres:
    container_name: TESTING-postgres-dev
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
    volumes:
    - langfuse_postgres_data:/var/lib/postgresql/data
    - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    container_name: TESTING-redis-dev
    image: docker.io/redis:7
    restart: unless-stopped
    command: '--requirepass ${REDIS_AUTH:-myredissecret} --maxmemory-policy noeviction

      '
    healthcheck:
      test:
      - CMD
      - redis-cli
      - --no-auth-warning
      - -a
      - ${REDIS_AUTH:-myredissecret}
      - ping
      interval: 3s
      timeout: 10s
      retries: 10
  cliproxy:
    container_name: TESTING-cliproxy-dev
    image: ${DOCKER_REGISTRY:-ghcr.io/echoares-lab/ai-gateway}/cliproxy:${GIT_SHA:-latest}
    build:
      context: ${CLIPROXY_BUILD_CONTEXT:-/home/dev/repos/CLIProxyAPI}
      dockerfile: ${CLIPROXY_DOCKERFILE:-Dockerfile}
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        ENVIRONMENT: ${ENVIRONMENT:-production}
    command:
    - ./CLIProxyAPI
    - --config
    - /config/config.yaml
    restart: unless-stopped
    volumes:
    - ${CLIPROXY_DEV_CONFIG:-${HOME}/.cliproxy/config.yaml}:/config/config.yaml:ro
    - dev_auth:/home/dev/.cli-proxy-api
    environment:
      MANAGEMENT_PASSWORD: dev-management-key
    ports:
    - ${DEV_CLIPROXY_PORT:-8327}:8317
  litellm:
    container_name: TESTING-litellm-dev
    image: ghcr.io/berriai/litellm:v1.87.1@sha256:9de33287d844a164f873479a04eebe065610e131d7e3aaf010f520fb5b4cfd7b
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      cliproxy:
        condition: service_started
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/litellm
      CLIPROXY_API_KEY: ${CLIPROXY_API_KEY}
      DISABLE_CACHE: 'true'
    volumes:
    - ./litellm-config.yaml:/app/config.yaml:ro
    command:
    - --config
    - /app/config.yaml
    - --port
    - '4000'
    ports:
    - ${DEV_LITELLM_PORT:-4011}:4000
    healthcheck:
      test:
      - CMD-SHELL
      - "python - <<'PY'\nimport urllib.request, sys\ntry:\n    r = urllib.request.urlopen('http://127.0.0.1:4000/health/readiness',\
        \ timeout=3)\n    sys.exit(0 if 200 <= r.status < 300 else 1)\nexcept Exception:\n\
        \    sys.exit(1)\nPY"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
  credential-prober:
    container_name: TESTING-credential-prober-dev
    image: ${DOCKER_REGISTRY:-ghcr.io/echoares-lab/ai-gateway}/credential-prober:${GIT_SHA:-latest}
    build:
      context: ./services/credential-prober
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        ENVIRONMENT: ${ENVIRONMENT:-production}
    restart: unless-stopped
    environment:
    - CLIPROXY_URL=http://cliproxy:8317
    - CLIPROXY_MANAGEMENT_KEY=${CLIPROXY_MANAGEMENT_KEY:-cliproxy-mgmt-H6VXKpUCzmeDuHcGmH8Oqg}
    - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/litellm
    - GATEWAY_ENGINE_URL=${GATEWAY_ENGINE_URL:-http://gateway-engine:4000}
    depends_on:
      postgres:
        condition: service_healthy
      cliproxy:
        condition: service_started
      gateway-engine:
        condition: service_started
  gateway-engine:
    container_name: TESTING-gateway-engine-dev
    image: ${DOCKER_REGISTRY:-ghcr.io/echoares-lab/ai-gateway}/gateway-engine:${GIT_SHA:-latest}
    build:
      context: ./services/gateway-engine
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        ENVIRONMENT: ${ENVIRONMENT:-production}
    command: uvicorn main:app --host 0.0.0.0 --port 4000 --reload
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      CLIPROXY_API_KEY: ${CLIPROXY_API_KEY}
      UPSTREAM_TIMEOUT: ${UPSTREAM_TIMEOUT:-30.0}
      LITELLM_CONFIG_PATH: /config/litellm-config.yaml
      DEV_SLOT: ${DEV_SLOT:-1}
      REDIS_URL: redis://:${REDIS_AUTH:-myredissecret}@redis:6379
      POLICY_ENGINE_ENABLED: ${POLICY_ENGINE_ENABLED:-false}
      POLICY_ENGINE_TIMEOUT_MS: ${POLICY_ENGINE_TIMEOUT_MS:-100}
    ports:
    - ${DEV_GATEWAY_ENGINE_PORT:-4010}:4000
    volumes:
    - ./services/gateway-engine:/app
    - ./litellm-config.yaml:/config/litellm-config.yaml:ro
  cpa-manager:
    container_name: TESTING-cpa-manager-dev
    image: seakee/cpa-manager:1.5.5
    restart: unless-stopped
    depends_on:
    - cliproxy
    ports:
    - ${DEV_CPA_MANAGER_PORT:-18327}:18317
    environment:
      HTTP_ADDR: 0.0.0.0:18317
      USAGE_DB_PATH: /data/usage.sqlite
      USAGE_COLLECTOR_MODE: auto
    volumes:
    - dev_cpa_data:/data
